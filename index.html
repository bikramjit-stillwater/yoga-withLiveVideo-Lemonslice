<!DOCTYPE html>
<html>
<head>
  <title>Stillwater Yoga</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e6f4f1, #f7fbfa);
      color: #2d3a3a;
    }

    /* LOGO */
    #logo {
      position: fixed;
      top: 15px;
      left: 20px;
      width: 70px;
      border-radius: 12px;
    }

    /* MAIN CARD */
    .container {
      max-width: 900px;
      margin: 80px auto;
      padding: 30px;
      background: white;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-bottom: 5px;
      color: #2c5f5d;
      font-size: 32px;
    }

    .tagline {
      font-size: 16px;
      color: #6b8f8d;
      margin-bottom: 25px;
    }

    /* AVATAR */
    #avatarContainer {
      transition: all 0.4s ease;
      margin-bottom: 20px;
    }

    .small-avatar {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 220px;
      z-index: 999;
    }

    /* VIDEO */
    #videoContainer {
      display: none;
      margin-top: 20px;
    }

    iframe {
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* BUTTONS */
    .buttons {
      margin-top: 25px;
    }

    button {
      padding: 12px 24px;
      margin: 8px;
      font-size: 15px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 500;
    }

    .btn-primary {
      background: #2c7a7b;
      color: white;
    }

    .btn-secondary {
      background: #68b0ab;
      color: white;
    }

    .btn-repeat {
      background: #dff3f1;
      color: #2c5f5d;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    }
  </style>
</head>

<body>

  <!-- LOGO -->
  <img id="logo" 
       src="https://media.licdn.com/dms/image/v2/D560BAQEuMEuoQOLNOg/company-logo_200_200/B56Z1iBkplJsAI-/0/1775466073533/stilwater_you_logo?e=1779321600&v=beta&t=yEpGMXIbEhVeaEw3KWC42nPk7bi5n-3fPeEh0cn4IsE" 
       alt="Stillwater Logo">

  <div class="container">

    <h1>🧘 Stillwater Yoga</h1>
    <div class="tagline">AI Powered Yoga Guide</div>

    <!-- Avatar -->
    <div id="avatarContainer">
      <lemon-slice-widget agent-id="agent_960a480563fb66ac"></lemon-slice-widget>
    </div>

    <script type="module" src="https://unpkg.com/@lemonsliceai/lemon-slice-widget"></script>

    <!-- Video -->
    <div id="videoContainer">
      <iframe id="videoPlayer" width="600" height="340" allow="autoplay" allowfullscreen></iframe>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button class="btn-primary" onclick="playTadasana()">🧘 Tadasana</button>
      <button class="btn-secondary" onclick="playVrikshasana()">🌳 Vrikshasana</button>
      <button class="btn-repeat" onclick="repeatPose()">🔁 Repeat</button>
    </div>

  </div>

  <script>
    const videos = {
      tadasana: "https://www.youtube.com/embed/MdTEXIdHxpI",
      vrikshasana: "https://www.youtube.com/embed/FuKBRfvLGj8"
    };

    let currentPose = "tadasana";

    function playTadasana() {
      currentPose = "tadasana";
      playVideo();
    }

    function playVrikshasana() {
      currentPose = "vrikshasana";
      playVideo();
    }

    function repeatPose() {
      playVideo();
    }

    function playVideo() {
      const player = document.getElementById("videoPlayer");
      const videoContainer = document.getElementById("videoContainer");
      const avatar = document.getElementById("avatarContainer");

      videoContainer.style.display = "block";
      player.src = videos[currentPose] + "?autoplay=1";

      avatar.classList.add("small-avatar");
    }
  </script>

</body>
</html>
